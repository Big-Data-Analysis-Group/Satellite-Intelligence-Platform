services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/satellite-damage-detection/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3